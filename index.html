<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vinca Gym — Pilih Sesi</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    :root {
      --color-akhwat:       #F15CA1;
      --color-akhwat-soft:  #F7A7D3;
      --color-akhwat-dim:   rgba(241, 92, 161, 0.12);
      --color-ikhwan:       #3B82F6;
      --color-ikhwan-soft:  #93C5FD;
      --color-ikhwan-dim:   rgba(59, 130, 246, 0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .font-serif { font-family: 'Playfair Display', serif; }

    /* ── Background ambient glow ── */
    .bg-ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .bg-ambient::before {
      content: '';
      position: absolute;
      top: -20%;
      left: -10%;
      width: 50%;
      height: 60%;
      background: radial-gradient(ellipse, rgba(241,92,161,0.08) 0%, transparent 70%);
      animation: drift 12s ease-in-out infinite alternate;
    }
    .bg-ambient::after {
      content: '';
      position: absolute;
      bottom: -20%;
      right: -10%;
      width: 50%;
      height: 60%;
      background: radial-gradient(ellipse, rgba(59,130,246,0.08) 0%, transparent 70%);
      animation: drift 12s ease-in-out infinite alternate-reverse;
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(3%, 5%) scale(1.05); }
    }

    /* ── Layout ── */
    .gateway-wrapper {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      gap: 3rem;
    }

    /* ── Logo / Header ── */
    .logo-area {
      text-align: center;
    }
    .logo-area img {
      height: 64px;
      width: auto;
      margin: 0 auto 1rem;
      display: block;
      filter: drop-shadow(0 0 20px rgba(255,255,255,0.1));
    }
    .logo-area h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.03em;
      line-height: 1.1;
    }
    .logo-area p {
      margin-top: 0.5rem;
      font-size: 1rem;
      color: #888;
      font-weight: 400;
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      width: 100%;
      max-width: 480px;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.08);
    }
    .divider span {
      font-size: 0.75rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      white-space: nowrap;
    }

    /* ── Cards Grid ── */
    .cards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      width: 100%;
      max-width: 680px;
    }
    @media (max-width: 520px) {
      .cards-grid {
        grid-template-columns: 1fr;
        max-width: 360px;
      }
    }

    /* ── Gateway Card ── */
    .gateway-card {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      padding: 2.5rem 1.5rem;
      border-radius: 1.5rem;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(20px);
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 0.35s ease,
                  border-color 0.3s ease,
                  background 0.3s ease;
      overflow: hidden;
    }

    /* Shimmer top line */
    .gateway-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .gateway-card:hover {
      transform: translateY(-8px) scale(1.02);
    }
    .gateway-card:active {
      transform: translateY(-4px) scale(1.01);
    }

    /* ── Akhwat variant ── */
    .card-akhwat::before {
      background: linear-gradient(90deg, transparent, var(--color-akhwat), transparent);
    }
    .card-akhwat:hover {
      border-color: rgba(241,92,161,0.3);
      background: var(--color-akhwat-dim);
      box-shadow: 0 20px 60px rgba(241,92,161,0.15),
                  0 0 0 1px rgba(241,92,161,0.1);
    }
    .card-akhwat:hover::before { opacity: 1; }

    /* ── Ikhwan variant ── */
    .card-ikhwan::before {
      background: linear-gradient(90deg, transparent, var(--color-ikhwan), transparent);
    }
    .card-ikhwan:hover {
      border-color: rgba(59,130,246,0.3);
      background: var(--color-ikhwan-dim);
      box-shadow: 0 20px 60px rgba(59,130,246,0.15),
                  0 0 0 1px rgba(59,130,246,0.1);
    }
    .card-ikhwan:hover::before { opacity: 1; }

    /* ── Icon circle ── */
    .card-icon {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: transform 0.3s ease;
    }
    .gateway-card:hover .card-icon {
      transform: scale(1.08) translateY(-3px);
    }
    .icon-akhwat {
      background: linear-gradient(135deg, rgba(241,92,161,0.12), rgba(247,167,211,0.06));
      border: 2px solid rgba(241,92,161,0.2);
    }
    .icon-ikhwan {
      background: linear-gradient(135deg, rgba(59,130,246,0.12), rgba(147,197,253,0.06));
      border: 2px solid rgba(59,130,246,0.2);
    }
    .card-icon img {
      width: 90px;
      height: 90px;
      object-fit: contain;
      object-position: bottom;
    }

    /* ── Card text ── */
    .card-title {
      font-size: 1.375rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.02em;
      text-align: center;
    }
    .card-subtitle {
      font-size: 0.8125rem;
      color: #666;
      text-align: center;
      line-height: 1.5;
    }

    /* ── Jam operasional badge ── */
    .jam-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.85rem;
      border-radius: 2rem;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .jam-akhwat {
      background: rgba(241,92,161,0.1);
      border: 1px solid rgba(241,92,161,0.2);
      color: var(--color-akhwat-soft);
    }
    .jam-ikhwan {
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.2);
      color: var(--color-ikhwan-soft);
    }

    /* ── Arrow indicator ── */
    .card-arrow {
      position: absolute;
      bottom: 1.25rem;
      right: 1.25rem;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.875rem;
      opacity: 0;
      transform: translateX(-6px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .gateway-card:hover .card-arrow {
      opacity: 1;
      transform: translateX(0);
    }
    .arrow-akhwat { background: rgba(241,92,161,0.15); color: var(--color-akhwat); }
    .arrow-ikhwan { background: rgba(59,130,246,0.15); color: var(--color-ikhwan); }

    /* ── Footer ── */
    .gateway-footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 1.5rem;
      font-size: 0.75rem;
      color: #444;
    }
    .gateway-footer a {
      color: #666;
      text-decoration: none;
      transition: color 0.2s;
    }
    .gateway-footer a:hover { color: #aaa; }

    /* ── Islamic values strip ── */
    .values-strip {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
    }
    .value-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.3rem 0.75rem;
      border-radius: 2rem;
      font-size: 0.7rem;
      font-weight: 500;
      background: rgba(16,185,129,0.08);
      border: 1px solid rgba(16,185,129,0.15);
      color: #6ee7b7;
    }
  </style>
</head>
<body>

  <!-- Ambient background glow -->
  <div class="bg-ambient" aria-hidden="true"></div>

  <main class="gateway-wrapper">

    <!-- Logo & Heading -->
    <div class="logo-area">
      <img src="logo.png" alt="Vinca Gym Logo">
      <h1 class="font-serif">Vinca Gym</h1>
      <p>Pilih sesi yang sesuai untuk melanjutkan</p>
    </div>

    <!-- Islamic Values -->
    <div class="values-strip" aria-label="Nilai-nilai gym">
      <span class="value-pill"><i class="ph ph-speaker-slash"></i> No Music</span>
      <span class="value-pill"><i class="ph ph-prohibit"></i> No Ikhtilat</span>
      <span class="value-pill"><i class="ph ph-camera-slash"></i> No Camera</span>
    </div>

    <!-- Divider -->
    <div class="divider"><span>Pilih Sesi</span></div>

    <!-- Gateway Cards -->
    <div class="cards-grid" role="navigation" aria-label="Pilihan gym">

      <!-- Akhwat Card -->
      <a href="akhwat/index.html" class="gateway-card card-akhwat" aria-label="Masuk ke Gym Akhwat">
        <div class="card-icon icon-akhwat" aria-hidden="true">
          <img src="akhwat-icon.svg" alt="Akhwat">
        </div>
        <div>
          <p class="card-title font-serif">Gym Akhwat</p>
          <p class="card-subtitle">Khusus Wanita<br>Ruang aman &amp; nyaman</p>
        </div>
        <span class="jam-badge jam-akhwat" style="flex-direction:column; gap:0.1rem; padding: 0.5rem 1rem;">
          <span style="font-size:0.65rem; opacity:0.8; letter-spacing:0.05em;">Buka Setiap Hari</span>
          <span class="flex items-center gap-1"><i class="ph ph-clock"></i> 05:00 – 20:00</span>
        </span>
        <div class="card-arrow arrow-akhwat" aria-hidden="true">
          <i class="ph ph-arrow-right"></i>
        </div>
      </a>

      <!-- Ikhwan Card -->
      <a href="ikhwan/index.html" class="gateway-card card-ikhwan" aria-label="Masuk ke Gym Ikhwan">
        <div class="card-icon icon-ikhwan" aria-hidden="true">
          <img src="ikhwan-icon.svg" alt="Ikhwan">
        </div>
        <div>
          <p class="card-title font-serif">Gym Ikhwan</p>
          <p class="card-subtitle">Khusus Pria<br>Fasilitas lengkap &amp; modern</p>
        </div>
        <span class="jam-badge jam-ikhwan" style="flex-direction:column; gap:0.1rem; padding: 0.5rem 1rem;">
          <span style="font-size:0.65rem; opacity:0.8; letter-spacing:0.05em;">Buka Setiap Hari</span>
          <span class="flex items-center gap-1"><i class="ph ph-clock"></i> 20:00 – 00:00</span>
        </span>
        <div class="card-arrow arrow-ikhwan" aria-hidden="true">
          <i class="ph ph-arrow-right"></i>
        </div>
      </a>

    </div>

  </main>

  <!-- Footer -->
  <footer class="gateway-footer">
    <p>Admin? <a href="admin.html">Masuk ke Dashboard</a></p>
  </footer>

</body>
</html>
